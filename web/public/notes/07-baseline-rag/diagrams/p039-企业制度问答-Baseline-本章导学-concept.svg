    <rect x="504" y="322" width="190" height="128" rx="20" fill="white" stroke="#059669" stroke-width="3"/><text x="599" y="365" text-anchor="middle" class="n">P42 架构设计</text><text x="599" y="397" text-anchor="middle" class="d">离线建库</text><text x="599" y="423" text-anchor="middle" class="d">在线问答</text>
    <rect x="734" y="322" width="190" height="128" rx="20" fill="white" stroke="#7c3aed" stroke-width="3"/><text x="829" y="365" text-anchor="middle" class="n">P43 开发测试</text><text x="829" y="397" text-anchor="middle" class="d">入库、检索、提示词</text><text x="829" y="423" text-anchor="middle" class="d">加班与差旅测试</text>
    <rect x="964" y="322" width="192" height="128" rx="20" fill="white" stroke="#3157d5" stroke-width="3"/><text x="1060" y="365" text-anchor="middle" class="n">P44 Baseline</text><text x="1060" y="397" text-anchor="middle" class="d">能运行 ≠ 能上线</text><text x="1060" y="423" text-anchor="middle" class="d">进入评估迭代</text>
