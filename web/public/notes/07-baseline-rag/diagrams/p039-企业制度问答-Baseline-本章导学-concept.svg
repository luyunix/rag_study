  <path d="M600 266V305" class="p"/>
  <g>
    <rect x="44" y="322" width="190" height="128" rx="20" fill="white" stroke="#2563eb" stroke-width="3"/><text x="139" y="365" text-anchor="middle" class="n">P40 需求分析</text><text x="139" y="397" text-anchor="middle" class="d">痛点、功能、依赖数据</text><text x="139" y="423" text-anchor="middle" class="d">先定义问题</text>
