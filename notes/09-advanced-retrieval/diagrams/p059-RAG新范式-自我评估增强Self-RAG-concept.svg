  <rect width="1200" height="680" rx="30" fill="url(#bg)"/>
  <text x="42" y="62" class="chapter">第 59 节 · P059 · 高级检索增强</text>
  <text x="600" y="115" text-anchor="middle" class="title">Self-RAG：三道判别控制后续策略</text>
  <text x="42" y="207" class="hint">本节完整知识链：概念、作用与前后关系都写在图内</text>
  <path d="M 236 340 L 266 340" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/><path d="M 468 340 L 498 340" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/><path d="M 700 340 L 730 340" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/><path d="M 932 340 L 962 340" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="42" y="245" width="190" height="190" rx="24" fill="white" stroke="#2563eb" stroke-width="4"/><circle cx="70" cy="270" r="16" fill="#2563eb"/><text x="70" y="277" text-anchor="middle" class="number">1</text><text x="137" y="307" text-anchor="middle" class="node">先检索文档</text><text x="137" y="354" text-anchor="middle" class="detail">课程流程从问题检索</text><text x="137" y="376" text-anchor="middle" class="detail">开始，不是先跳过检索</text><rect x="274" y="245" width="190" height="190" rx="24" fill="white" stroke="#0891b2" stroke-width="4"/><circle cx="302" cy="270" r="16" fill="#0891b2"/><text x="302" y="277" text-anchor="middle" class="number">2</text><text x="369" y="307" text-anchor="middle" class="node">文档相关？</text><text x="369" y="354" text-anchor="middle" class="detail">否：过滤、改写查询</text><text x="369" y="376" text-anchor="middle" class="detail">或生成假设文档再检索</text><rect x="506" y="245" width="190" height="190" rx="24" fill="white" stroke="#059669" stroke-width="4"/><circle cx="534" cy="270" r="16" fill="#059669"/><text x="534" y="277" text-anchor="middle" class="number">3</text><text x="601" y="307" text-anchor="middle" class="node">基于证据生成</text><text x="601" y="354" text-anchor="middle" class="detail">只使用保留下来的</text><text x="601" y="376" text-anchor="middle" class="detail">相关上下文回答</text><rect x="738" y="245" width="190" height="190" rx="24" fill="white" stroke="#7c3aed" stroke-width="4"/><circle cx="766" cy="270" r="16" fill="#7c3aed"/><text x="766" y="277" text-anchor="middle" class="number">4</text><text x="833" y="307" text-anchor="middle" class="node">答案有依据？</text><text x="833" y="354" text-anchor="middle" class="detail">否：拒答或重试</text><text x="833" y="376" text-anchor="middle" class="detail">不能把流畅当正确</text><rect x="970" y="245" width="190" height="190" rx="24" fill="white" stroke="#3157d5" stroke-width="4"/><circle cx="998" cy="270" r="16" fill="#3157d5"/><text x="998" y="277" text-anchor="middle" class="number">5</text><text x="1065" y="307" text-anchor="middle" class="node">回答原问题？</text><text x="1065" y="354" text-anchor="middle" class="detail">是：输出；否：增强</text><text x="1065" y="376" text-anchor="middle" class="detail">或进入下一轮</text>
  <rect x="42" y="492" width="1116" height="132" rx="24" fill="#0f172a"/>
  <text x="70" y="532" class="brand">学完必须能回答</text>
  <text x="600" y="575" text-anchor="middle" class="question">文档相关、答案有依据、答案有用，三关都通过才输出</text>
