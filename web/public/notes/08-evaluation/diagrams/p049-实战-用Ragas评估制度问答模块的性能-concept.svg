<svg xmlns="http://www.w3.org/2000/svg" role="img" width="1200" height="680" viewBox="0 0 1200 680">
  <title>P49 用 Ragas 评估制度问答 Pipeline</title>
  <desc>人工问题和标准答案进入制度问答 Pipeline，收集答案与有序上下文，组成 Dataset 后由评审 LLM 和 Embedding 计算四项指标。</desc>
  <defs><linearGradient id="b49" x1="0" x2="1"><stop stop-color="#f4f6fb"/><stop offset="1" stop-color="#ecfeff"/></linearGradient><marker id="a49" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 12 6 0 12Z" fill="#64748b"/></marker><style>.h{font:700 22px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#203ea8}.t{font:700 31px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#0f172a}.n{font:700 18px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#0f172a}.d{font:500 14px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#475569}.p{stroke:#64748b;stroke-width:4;fill:none;marker-end:url(#a49)}</style></defs>
  <rect width="1200" height="680" rx="30" fill="url(#b49)"/>
  <text x="44" y="58" class="h">第 8 章 · P049 · Ragas 评估实战</text>
  <text x="600" y="105" text-anchor="middle" class="t">把问答函数改成“答案 + 上下文”，才能评估完整 RAG</text>
  <text x="44" y="158" class="n">A. 收集四字段 Dataset</text>
  <rect x="44" y="185" width="190" height="120" rx="20" fill="white" stroke="#2563eb" stroke-width="3"/><text x="139" y="224" text-anchor="middle" class="n">人工评测数据</text><text x="139" y="255" text-anchor="middle" class="d">questions</text><text x="139" y="280" text-anchor="middle" class="d">ground_truths</text>
  <rect x="280" y="185" width="235" height="120" rx="20" fill="white" stroke="#059669" stroke-width="3"/><text x="397" y="224" text-anchor="middle" class="n">制度问答 Pipeline</text><text x="397" y="255" text-anchor="middle" class="d">Chroma“制度DB” · k=3</text><text x="397" y="280" text-anchor="middle" class="d">Qwen2-72B 生成</text>
  <rect x="561" y="185" width="220" height="120" rx="20" fill="white" stroke="#7c3aed" stroke-width="3"/><text x="671" y="224" text-anchor="middle" class="n">逐题收集</text><text x="671" y="255" text-anchor="middle" class="d">answers</text><text x="671" y="280" text-anchor="middle" class="d">contexts（保留排名）</text>
  <rect x="827" y="175" width="329" height="140" rx="22" fill="#0f172a"/><text x="991" y="217" text-anchor="middle" style="font:700 18px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:white">Dataset.from_dict</text><text x="991" y="250" text-anchor="middle" style="font:500 14px ui-monospace,SFMono-Regular,monospace;fill:#cbd5e1">question · answer</text><text x="991" y="276" text-anchor="middle" style="font:500 14px ui-monospace,SFMono-Regular,monospace;fill:#cbd5e1">contexts · ground_truth</text>
  <path d="M234 245H274M515 245H555M781 245H821" class="p"/>
  <text x="44" y="372" class="n">B. 自动评审并解释低分</text>
  <rect x="44" y="400" width="230" height="120" rx="20" fill="white" stroke="#2563eb" stroke-width="3"/><text x="159" y="439" text-anchor="middle" class="n">评审器配置</text><text x="159" y="470" text-anchor="middle" class="d">Qwen2-72B + BGE-M3</text><text x="159" y="495" text-anchor="middle" class="d">增加超时时间</text>
  <rect x="320" y="390" width="260" height="140" rx="22" fill="#7c3aed"/><text x="450" y="433" text-anchor="middle" style="font:700 20px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:white">Ragas evaluate</text><text x="450" y="470" text-anchor="middle" style="font:500 14px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:#ede9fe">Faithfulness · Relevancy</text><text x="450" y="497" text-anchor="middle" style="font:500 14px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:#ede9fe">Context Recall · Precision</text>
  <rect x="626" y="400" width="230" height="120" rx="20" fill="white" stroke="#0891b2" stroke-width="3"/><text x="741" y="439" text-anchor="middle" class="n">逐样本结果</text><text x="741" y="470" text-anchor="middle" class="d">转成表格</text><text x="741" y="495" text-anchor="middle" class="d">不要只看平均分</text>
  <rect x="902" y="390" width="254" height="140" rx="22" fill="white" stroke="#3157d5" stroke-width="3"/><text x="1029" y="433" text-anchor="middle" class="n">针对性改进</text><text x="1029" y="466" text-anchor="middle" class="d">检索低 → 改召回/排序</text><text x="1029" y="493" text-anchor="middle" class="d">生成低 → 改提示词/模型</text>
  <path d="M274 460H314M580 460H620M856 460H896" class="p"/>
  <path d="M991 315V350C991 370 450 370 450 384" class="p"/>
  <rect x="170" y="585" width="860" height="58" rx="20" fill="#0e7490"/><text x="600" y="620" text-anchor="middle" style="font:600 16px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:white">学完必须能回答：两道题跑通为何只是代码验收，而不是性能验收？</text>
</svg>
