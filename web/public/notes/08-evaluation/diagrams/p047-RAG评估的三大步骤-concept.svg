<svg xmlns="http://www.w3.org/2000/svg" role="img" width="1200" height="680" viewBox="0 0 1200 680">
  <title>P47 RAG 评估的三个步骤</title>
  <desc>构建测试数据集、选择评估指标、执行评估，并把逐样本结果用于下一轮数据集和系统改进。</desc>
  <defs><linearGradient id="b47" x1="0" x2="1"><stop stop-color="#f0fdf4"/><stop offset="1" stop-color="#f4f6fb"/></linearGradient><marker id="a47" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 12 6 0 12Z" fill="#64748b"/></marker><style>.h{font:700 22px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#047857}.t{font:700 32px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#0f172a}.n{font:700 22px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#0f172a}.d{font:500 16px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#475569}.p{stroke:#64748b;stroke-width:5;fill:none;marker-end:url(#a47)}</style></defs>
  <rect width="1200" height="680" rx="30" fill="url(#b47)"/>
  <text x="44" y="58" class="h">第 8 章 · P047 · 三步执行评估</text>
  <text x="600" y="108" text-anchor="middle" class="t">先准备基准，再决定尺子，最后测量系统</text>
  <rect x="60" y="180" width="300" height="215" rx="28" fill="white" stroke="#2563eb" stroke-width="4"/><circle cx="105" cy="225" r="25" fill="#2563eb"/><text x="105" y="233" text-anchor="middle" style="font:700 18px sans-serif;fill:white">1</text><text x="210" y="230" text-anchor="middle" class="n">构建测试数据集</text><text x="210" y="280" text-anchor="middle" class="d">question</text><text x="210" y="313" text-anchor="middle" class="d">ground_truth</text><text x="210" y="350" text-anchor="middle" class="d">覆盖正常、边界与拒答问题</text>
  <rect x="450" y="180" width="300" height="215" rx="28" fill="white" stroke="#059669" stroke-width="4"/><circle cx="495" cy="225" r="25" fill="#059669"/><text x="495" y="233" text-anchor="middle" style="font:700 18px sans-serif;fill:white">2</text><text x="600" y="230" text-anchor="middle" class="n">选择评估指标</text><text x="600" y="280" text-anchor="middle" class="d">检索：覆盖与排序</text><text x="600" y="313" text-anchor="middle" class="d">生成：忠实与相关</text><text x="600" y="350" text-anchor="middle" class="d">先确认指标需要哪些字段</text>
  <rect x="840" y="180" width="300" height="215" rx="28" fill="white" stroke="#7c3aed" stroke-width="4"/><circle cx="885" cy="225" r="25" fill="#7c3aed"/><text x="885" y="233" text-anchor="middle" style="font:700 18px sans-serif;fill:white">3</text><text x="990" y="230" text-anchor="middle" class="n">执行并计算</text><text x="990" y="280" text-anchor="middle" class="d">问题进入 RAG Pipeline</text><text x="990" y="313" text-anchor="middle" class="d">收集 contexts + answer</text><text x="990" y="350" text-anchor="middle" class="d">保存逐样本分数与配置</text>
  <path d="M360 288H442M750 288H832" class="p"/>
  <rect x="250" y="470" width="700" height="120" rx="26" fill="#0f172a"/><text x="600" y="510" text-anchor="middle" style="font:700 21px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:white">结果不是一个平均分</text><text x="600" y="546" text-anchor="middle" style="font:500 16px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:#cbd5e1">逐条查看 question · contexts · answer · ground_truth，定位检索或生成失败</text><text x="600" y="574" text-anchor="middle" style="font:600 16px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:#d1fae5">学完必须能回答：哪些字段由人工提供，哪些字段由当前 RAG 产生？</text>
  <path d="M250 530C120 530 90 430 150 400" class="p"/>
</svg>
