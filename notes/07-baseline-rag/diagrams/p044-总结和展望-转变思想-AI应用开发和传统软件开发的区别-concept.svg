<svg xmlns="http://www.w3.org/2000/svg" role="img" width="1200" height="680" viewBox="0 0 1200 680">
  <title>P44 AI 应用开发的 Baseline 评测迭代闭环</title>
  <desc>对比传统规则软件的确定性与 AI 应用的不确定性，并展示 Baseline、业务评测、失败分析、改进、上线和线上反馈的循环。</desc>
  <defs><linearGradient id="bg44" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff7ed"/><stop offset="1" stop-color="#f5f3ff"/></linearGradient><marker id="a44" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 12 6 0 12Z" fill="#64748b"/></marker><style>.h{font:700 22px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#c2410c}.t{font:700 30px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#0f172a}.n{font:700 18px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#0f172a}.d{font:500 15px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#475569}.p{stroke:#64748b;stroke-width:4;fill:none;marker-end:url(#a44)}</style></defs>
  <rect width="1200" height="680" rx="30" fill="url(#bg44)"/>
  <text x="44" y="58" class="h">第 7 章 · P044 · 总结：从“做完功能”转向“评测驱动”</text>
  <text x="600" y="108" text-anchor="middle" class="t">能运行只是 Baseline；AI 应用必须用数据证明能否交付</text>
  <rect x="45" y="150" width="525" height="130" rx="22" fill="white" stroke="#2563eb" stroke-width="3"/><text x="307" y="190" text-anchor="middle" class="n">传统软件：以确定性规则为主</text><text x="307" y="225" text-anchor="middle" class="d">需求 → 设计 → 代码 → 功能测试 → 部署运维</text><text x="307" y="252" text-anchor="middle" class="d">输入与状态固定时，预期结果通常可以事先说明</text>
  <rect x="630" y="150" width="525" height="130" rx="22" fill="white" stroke="#ea580c" stroke-width="3"/><text x="892" y="190" text-anchor="middle" class="n">AI 应用：额外面对结果不确定性</text><text x="892" y="225" text-anchor="middle" class="d">用户表达多样 · 检索可能失误 · 模型生成具有随机性</text><text x="892" y="252" text-anchor="middle" class="d">设计完成后仍无法保证所有回答符合预期</text>
  <text x="44" y="335" class="n">Baseline 思维与持续迭代</text>
  <rect x="44" y="375" width="170" height="105" rx="20" fill="white" stroke="#2563eb" stroke-width="3"/><text x="129" y="416" text-anchor="middle" class="n">1 可测试基线</text><text x="129" y="449" text-anchor="middle" class="d">先跑通完整链路</text>
  <rect x="254" y="375" width="170" height="105" rx="20" fill="white" stroke="#0891b2" stroke-width="3"/><text x="339" y="416" text-anchor="middle" class="n">2 业务评测集</text><text x="339" y="449" text-anchor="middle" class="d">正常 / 边界 / 拒答</text>
  <rect x="464" y="375" width="170" height="105" rx="20" fill="white" stroke="#059669" stroke-width="3"/><text x="549" y="416" text-anchor="middle" class="n">3 测试评估</text><text x="549" y="449" text-anchor="middle" class="d">检索与生成分开看</text>
  <polygon points="759,365 865,427 759,489 653,427" fill="white" stroke="#7c3aed" stroke-width="3"/><text x="759" y="417" text-anchor="middle" class="n">达到门槛？</text><text x="759" y="446" text-anchor="middle" class="d">质量 / 延迟 / 风险</text>
  <rect x="895" y="375" width="170" height="105" rx="20" fill="white" stroke="#ea580c" stroke-width="3"/><text x="980" y="416" text-anchor="middle" class="n">4 上线部署</text><text x="980" y="449" text-anchor="middle" class="d">仍需持续观察</text>
  <path d="M214 427H248M424 427H458M634 427H647M865 427H889" class="p"/>
  <text x="678" y="381" class="d">否</text><text x="870" y="413" class="d">是</text>
  <rect x="435" y="535" width="300" height="85" rx="20" fill="#0f172a"/><text x="585" y="565" text-anchor="middle" style="font:700 16px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:white">学完必须能回答</text><text x="585" y="592" text-anchor="middle" style="font:500 13px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:#cbd5e1">为何 Baseline 必须评测迭代？</text>
  <path d="M725 480C725 510 700 520 670 530" class="p"/><path d="M435 578C310 578 339 520 339 486" class="p"/>
  <rect x="830" y="535" width="325" height="85" rx="20" fill="#c2410c"/><text x="992" y="569" text-anchor="middle" style="font:700 18px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:white">线上失败样本</text><text x="992" y="597" text-anchor="middle" style="font:500 14px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:#ffedd5">脱敏、审核后补充到回归评测集</text>
  <path d="M980 480V529" class="p"/><path d="M830 578C760 650 339 650 339 486" class="p"/>
</svg>
