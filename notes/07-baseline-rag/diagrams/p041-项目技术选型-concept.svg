<svg xmlns="http://www.w3.org/2000/svg" role="img" width="1200" height="680" viewBox="0 0 1200 680">
  <title>P41 企业制度问答项目技术选型</title>
  <desc>课程演示选用 BGE-M3、Chroma、Qwen2-72B、RAGFlow DeepDoc、LangChain 和 Gradio，并注明选择理由与可替换边界。</desc>
  <defs><linearGradient id="bg41" x1="0" x2="1"><stop stop-color="#f0fdf4"/><stop offset="1" stop-color="#eff6ff"/></linearGradient><style>.h{font:700 22px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#047857}.t{font:700 31px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#0f172a}.n{font:700 19px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#0f172a}.d{font:500 15px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#475569}.k{font:700 16px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#0369a1}</style></defs>
  <rect width="1200" height="680" rx="30" fill="url(#bg41)"/>
  <text x="44" y="58" class="h">第 7 章 · P041 · 项目技术选型</text>
  <text x="600" y="106" text-anchor="middle" class="t">小规模 POC 的实际组件：先验证方案，再根据评测调整</text>
  <rect x="44" y="150" width="1112" height="82" rx="20" fill="#0f172a"/>
  <text x="600" y="183" text-anchor="middle" style="font:700 20px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:white">当前约束</text><text x="600" y="211" text-anchor="middle" style="font:500 16px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:#cbd5e1">文档量少 · 扩展要求不高 · 优先跑通端到端并确认效果上限</text>
  <g>
    <rect x="44" y="275" width="205" height="245" rx="22" fill="white" stroke="#2563eb" stroke-width="3"/><text x="146" y="315" text-anchor="middle" class="n">Embedding</text><text x="146" y="352" text-anchor="middle" class="k">BGE-M3</text><text x="146" y="388" text-anchor="middle" class="d">1024 维</text><text x="146" y="416" text-anchor="middle" class="d">约 8K Token 输入</text><text x="146" y="444" text-anchor="middle" class="d">约 5.6 亿参数</text><text x="146" y="472" text-anchor="middle" class="d">课程环境约 2GB</text><text x="146" y="499" text-anchor="middle" class="d">负责语义召回</text>
    <rect x="271" y="275" width="205" height="245" rx="22" fill="white" stroke="#0891b2" stroke-width="3"/><text x="373" y="315" text-anchor="middle" class="n">向量数据库</text><text x="373" y="352" text-anchor="middle" class="k">Chroma</text><text x="373" y="388" text-anchor="middle" class="d">文档数量较少</text><text x="373" y="416" text-anchor="middle" class="d">无需复杂扩展</text><text x="373" y="444" text-anchor="middle" class="d">部署与调用简单</text><text x="373" y="472" text-anchor="middle" class="d">足够支持课程 POC</text><text x="373" y="499" text-anchor="middle" class="d">规模变大可替换</text>
    <rect x="498" y="275" width="205" height="245" rx="22" fill="white" stroke="#059669" stroke-width="3"/><text x="600" y="315" text-anchor="middle" class="n">生成模型</text><text x="600" y="352" text-anchor="middle" class="k">Qwen2-72B</text><text x="600" y="388" text-anchor="middle" class="d">先用强模型验证</text><text x="600" y="416" text-anchor="middle" class="d">OpenAI-compatible</text><text x="600" y="444" text-anchor="middle" class="d">也可替换闭源 API</text><text x="600" y="472" text-anchor="middle" class="d">负责依据证据生成</text><text x="600" y="499" text-anchor="middle" class="d">再考虑降本</text>
    <rect x="725" y="275" width="205" height="245" rx="22" fill="white" stroke="#7c3aed" stroke-width="3"/><text x="827" y="315" text-anchor="middle" class="n">文档处理</text><text x="827" y="352" text-anchor="middle" class="k">DeepDoc</text><text x="827" y="388" text-anchor="middle" class="d">PDF / OCR / 表格</text><text x="827" y="416" text-anchor="middle" class="d">布局分析</text><text x="827" y="444" text-anchor="middle" class="k">LangChain</text><text x="827" y="472" text-anchor="middle" class="d">长文本再次分块</text><text x="827" y="499" text-anchor="middle" class="d">保留文档结构</text>
    <rect x="952" y="275" width="204" height="245" rx="22" fill="white" stroke="#3157d5" stroke-width="3"/><text x="1054" y="315" text-anchor="middle" class="n">应用层</text><text x="1054" y="352" text-anchor="middle" class="k">LangChain</text><text x="1054" y="388" text-anchor="middle" class="d">流程编排</text><text x="1054" y="430" text-anchor="middle" class="k">Gradio</text><text x="1054" y="466" text-anchor="middle" class="d">演示界面</text><text x="1054" y="499" text-anchor="middle" class="d">不等于生产架构</text>
  </g>
  <rect x="210" y="568" width="780" height="72" rx="20" fill="#047857"/>
  <text x="600" y="596" text-anchor="middle" style="font:700 18px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:white">学完必须能回答：为什么选择这些组件？</text><text x="600" y="623" text-anchor="middle" style="font:500 16px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:#d1fae5">统一问题集比较召回、答案、延迟和部署约束；条件变化后重新评测</text>
</svg>
