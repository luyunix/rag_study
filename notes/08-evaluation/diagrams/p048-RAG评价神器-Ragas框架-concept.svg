<svg xmlns="http://www.w3.org/2000/svg" role="img" width="1200" height="680" viewBox="0 0 1200 680">
  <title>P48 Ragas 四个核心指标</title>
  <desc>用四字段评测样本计算 Faithfulness、Answer Relevancy、Context Recall 和 Context Precision，并区分生成与检索指标。</desc>
  <defs><linearGradient id="b48" x1="0" x2="1"><stop stop-color="#faf5ff"/><stop offset="1" stop-color="#eff6ff"/></linearGradient><style>.h{font:700 22px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#7e22ce}.t{font:700 32px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#0f172a}.n{font:700 19px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#0f172a}.d{font:500 14px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#475569}.f{font:600 15px ui-monospace,SFMono-Regular,monospace;fill:#334155}</style></defs>
  <rect width="1200" height="680" rx="30" fill="url(#b48)"/>
  <text x="44" y="58" class="h">第 8 章 · P048 · Ragas 指标原理</text>
  <text x="600" y="105" text-anchor="middle" class="t">四字段输入，分别诊断生成质量与检索质量</text>
  <rect x="55" y="145" width="1090" height="85" rx="22" fill="#0f172a"/>
  <text x="600" y="180" text-anchor="middle" style="font:700 19px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:white">评测样本</text>
  <text x="600" y="210" text-anchor="middle" style="font:500 16px ui-monospace,SFMono-Regular,monospace;fill:#cbd5e1">question · answer · contexts（有顺序）· ground_truth</text>
  <rect x="55" y="265" width="525" height="145" rx="24" fill="white" stroke="#7c3aed" stroke-width="3"/><text x="317" y="302" text-anchor="middle" class="n">Faithfulness · 忠实性</text><text x="317" y="334" text-anchor="middle" class="d">拆 answer 的事实，逐条检查 contexts 是否支持</text><text x="317" y="371" text-anchor="middle" class="f">支持的答案陈述 / 全部答案陈述</text><text x="317" y="395" text-anchor="middle" class="d">诊断：有没有无依据编造</text>
  <rect x="620" y="265" width="525" height="145" rx="24" fill="white" stroke="#2563eb" stroke-width="3"/><text x="882" y="302" text-anchor="middle" class="n">Answer Relevancy · 答案相关性</text><text x="882" y="334" text-anchor="middle" class="d">从 answer 反向生成问题，与 question 做向量相似度</text><text x="882" y="371" text-anchor="middle" class="f">mean cosine(潜在问题, 原问题)</text><text x="882" y="395" text-anchor="middle" class="d">诊断：是否答到点上、遗漏或冗余</text>
  <rect x="55" y="440" width="525" height="145" rx="24" fill="white" stroke="#059669" stroke-width="3"/><text x="317" y="477" text-anchor="middle" class="n">Context Recall · 上下文召回率</text><text x="317" y="509" text-anchor="middle" class="d">拆 ground_truth 的事实，检查 contexts 是否覆盖</text><text x="317" y="546" text-anchor="middle" class="f">支持的标准陈述 / 全部标准陈述</text><text x="317" y="570" text-anchor="middle" class="d">诊断：回答所需事实是否找全</text>
  <rect x="620" y="440" width="525" height="145" rx="24" fill="white" stroke="#3157d5" stroke-width="3"/><text x="882" y="477" text-anchor="middle" class="n">Context Precision · 上下文精度</text><text x="882" y="509" text-anchor="middle" class="d">逐位判断相关性，用排名位置计算 Average Precision</text><text x="882" y="546" text-anchor="middle" class="f">[0, 1, 1] → (1/2 + 2/3) / 2 ≈ 0.58</text><text x="882" y="570" text-anchor="middle" class="d">诊断：相关上下文是否排在前面</text>
  <rect x="230" y="615" width="740" height="42" rx="18" fill="#7e22ce"/><text x="600" y="643" text-anchor="middle" style="font:600 16px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:white">学完必须能回答：四个指标各比较哪两个对象，又会指向哪类改进？</text>
</svg>
