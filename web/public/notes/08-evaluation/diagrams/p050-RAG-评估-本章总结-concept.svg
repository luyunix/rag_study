<svg xmlns="http://www.w3.org/2000/svg" role="img" width="1200" height="680" viewBox="0 0 1200 680">
  <title>P50 RAG 评估与迭代闭环</title>
  <desc>Baseline 经测试集与四项指标评估，未达门槛时按检索或生成坏例改进，达标后部署并把线上失败样本回流。</desc>
  <defs><linearGradient id="b50" x1="0" x2="1"><stop stop-color="#ecfdf5"/><stop offset="1" stop-color="#f4f6fb"/></linearGradient><marker id="a50" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 12 6 0 12Z" fill="#64748b"/></marker><style>.h{font:700 22px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#047857}.t{font:700 32px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#0f172a}.n{font:700 18px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#0f172a}.d{font:500 14px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;fill:#475569}.p{stroke:#64748b;stroke-width:4;fill:none;marker-end:url(#a50)}</style></defs>
  <rect width="1200" height="680" rx="30" fill="url(#b50)"/>
  <text x="44" y="58" class="h">第 8 章 · P050 · 评估闭环总结</text>
  <text x="600" y="108" text-anchor="middle" class="t">指标的终点不是分数，而是下一次可验证的改进</text>
  <rect x="44" y="215" width="170" height="105" rx="20" fill="white" stroke="#2563eb" stroke-width="3"/><text x="129" y="255" text-anchor="middle" class="n">RAG Baseline</text><text x="129" y="287" text-anchor="middle" class="d">固定版本与配置</text>
  <rect x="254" y="215" width="170" height="105" rx="20" fill="white" stroke="#0891b2" stroke-width="3"/><text x="339" y="255" text-anchor="middle" class="n">测试数据集</text><text x="339" y="287" text-anchor="middle" class="d">问题 + 标准答案</text>
  <rect x="464" y="200" width="185" height="135" rx="22" fill="white" stroke="#059669" stroke-width="3"/><text x="556" y="238" text-anchor="middle" class="n">Ragas 四指标</text><text x="556" y="270" text-anchor="middle" class="d">检索：Recall / Precision</text><text x="556" y="298" text-anchor="middle" class="d">生成：忠实 / 相关</text>
  <polygon points="770,190 885,267 770,344 655,267" fill="white" stroke="#7c3aed" stroke-width="3"/><text x="770" y="258" text-anchor="middle" class="n">达到门槛？</text><text x="770" y="287" text-anchor="middle" class="d">逐样本检查</text>
  <rect x="925" y="215" width="230" height="105" rx="20" fill="white" stroke="#3157d5" stroke-width="3"/><text x="1040" y="255" text-anchor="middle" class="n">上线 / 升级部署</text><text x="1040" y="287" text-anchor="middle" class="d">继续采集失败样本</text>
  <path d="M214 267H248M424 267H458M649 267H650M885 267H919" class="p"/>
  <text x="884" y="248" class="d">是</text><text x="694" y="365" class="d">否</text>
  <rect x="225" y="440" width="280" height="130" rx="22" fill="#0f172a"/><text x="365" y="478" text-anchor="middle" style="font:700 18px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:white">检索坏例</text><text x="365" y="510" text-anchor="middle" style="font:500 14px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:#cbd5e1">改解析 · 分块 · Embedding</text><text x="365" y="537" text-anchor="middle" style="font:500 14px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:#cbd5e1">召回 · 排序 · Top-k</text>
  <rect x="550" y="440" width="280" height="130" rx="22" fill="#0f172a"/><text x="690" y="478" text-anchor="middle" style="font:700 18px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:white">生成坏例</text><text x="690" y="510" text-anchor="middle" style="font:500 14px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:#cbd5e1">改上下文组织 · 提示词</text><text x="690" y="537" text-anchor="middle" style="font:500 14px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:#cbd5e1">拒答规则 · 生成模型</text>
  <rect x="875" y="440" width="280" height="130" rx="22" fill="#203ea8"/><text x="1015" y="478" text-anchor="middle" style="font:700 18px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:white">线上失败样本</text><text x="1015" y="510" text-anchor="middle" style="font:500 14px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:#eef2ff">脱敏、审核、补标准答案</text><text x="1015" y="537" text-anchor="middle" style="font:500 14px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:#eef2ff">回流到下一版测试集</text>
  <path d="M730 345C700 395 545 395 505 434M770 345C770 400 720 410 700 434M1040 320V434M225 505C100 505 100 370 129 326" class="p"/>
  <rect x="230" y="615" width="740" height="42" rx="18" fill="#047857"/><text x="600" y="643" text-anchor="middle" style="font:600 16px -apple-system,BlinkMacSystemFont,'PingFang SC';fill:white">学完必须能回答：一个低分指标怎样转化成下一次受控实验？</text>
</svg>
